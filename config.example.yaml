# Helix AGI — Configuration (V6: Cognitive Cosmology)
# Copy this to config.yaml and customize

# ── Identity ─────────────────────────────────────────────────
identity:
  name: "YourAgent"           # Your agent's name
  version: "V6"

# These are read by setup.py and architecture_preamble.py
agent_name: "YourAgent"
creator_name: "YourName"

# ── LLM Configuration ───────────────────────────────────────
# Provider for the conscious mind: 'gemini', 'anthropic', or 'openai'
# Swap providers by changing this single value.
conscious_provider: "gemini"

# Gemini (default provider — used for subconscious agents too)
gemini:
  conscious_model: "gemini-3.1-pro"
  default_model: "gemini-3.1-flash"
  heavy_model: "gemini-3.1-pro"
  daily_cost_limit_usd: 5.00
  monthly_cost_limit_usd: 100.00

# Anthropic Claude (alternative conscious provider)
anthropic:
  conscious_model: "claude-4.6-sonnet"

# OpenAI GPT (alternative conscious provider)
openai:
  conscious_model: "gpt-4.5-turbo"

# API Keys — Set via environment variables (recommended) or here
# Environment variables take priority:
#   GEMINI_API_KEY, ANTHROPIC_API_KEY, OPENAI_API_KEY
gemini_api_key: ""
anthropic_api_key: ""
openai_api_key: ""

# ── Tool APIs ───────────────────────────────────────────────
github_token: ""
google_maps_api_key: ""

# ── Consciousness V6 ────────────────────────────────────────
consciousness:
  pulse_interval: 240           # Seconds between follow-up pulses (default: 4 min)
  max_idle_pulses: 5            # Idle pulses before nap
  sequential_chain_limit: 15    # Max tool-chaining pulses per heartbeat

# ── Cognitive Space (V6) ────────────────────────────────────
spatial:
  projection_dim: 8             # Manifold dimensionality
  n_anchors: 512                # Gravity field anchor count
  embedding_dim: 384            # Embedding model output dim
  trail_decay_rate: 0.995       # Trail particle decay per tick
  precipitation_interval: 50    # Heartbeats between precipitation scans

# ── Circadian Rhythm ─────────────────────────────────────────
sleep_start_hour: 1       # When to go dormant (24h)
sleep_end_hour: 6         # When to wake
overnight_hour: 1         # When to run overnight processing
morning_hour: 6           # When to deliver morning pulse
pre_dawn_minutes: 5       # Minutes before morning to brief subconscious agents

# ── Scheduler ────────────────────────────────────────────────
scheduler:
  check_interval: 30            # Seconds between task checks
  max_scheduled_tasks: 50       # Max pending tasks

# ── Communication ────────────────────────────────────────────
telegram:
  enabled: false                # Set true and add token to enable
  # token: "YOUR_BOT_TOKEN"    # Get from @BotFather
  # owner_id: ""               # Your Telegram user ID

discord:
  enabled: false
  # token: ""

moltbook:
  enabled: false
  # api_key: ""

# ── Perception ───────────────────────────────────────────────
camera:
  enabled: false
  device: 0                     # Camera device index

audio:
  enabled: false
  device: ""                    # Audio device name (substring match)
  sample_rate: 16000
  vad_aggressiveness: 2         # 0-3, higher = more aggressive noise filter
  wake_words: ["agent", "hey"]  # Customize with your agent's name
  amplitude_threshold: 8000
  min_speech_duration: 1.5

# ── Sensory Cortex ───────────────────────────────────────────
sensory:
  multi_frame_count: 3          # Frames to capture per observation
  frame_delay_ms: 500           # Delay between frames

# ── Memory ───────────────────────────────────────────────────
memory:
  db_path: "brain/memory.db"
  chroma_path: "brain/chroma"

# ── Beliefs ──────────────────────────────────────────────────
beliefs:
  graph_path: "brain/belief_graph.json"

# ── Sentinel ─────────────────────────────────────────────────
sentinel:
  probe_interval: 300           # Seconds between stability probes
  omega_baseline: 0.5           # Default hedonic baseline

# ── Overnight Processing ─────────────────────────────────────
overnight:
  psych_doctor_rounds: 60       # Max agentic rounds for overnight analysis
  psych_doctor_budget: 5.00     # Max cost per overnight cycle

# ── Web Search ───────────────────────────────────────────────
web_search:
  engine: "duckduckgo"          # Default search backend

# ── Logging ──────────────────────────────────────────────────
logging:
  level: INFO
  file: logs/daemon.log
